<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Shopping List</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --card: #fffdf7;
    --green: #2d6a4f;
    --green-light: #74c69d;
    --green-pale: #d8f3dc;
    --orange: #e76f51;
    --orange-pale: #fde8e2;
    --blue: #2d6899;
    --blue-pale: #dbeafe;
    --purple: #6b46c1;
    --purple-pale: #ede9fe;
    --gray: #6b7280;
    --border: #e5dfd0;
    --text: #1a1a1a;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
  }

  /* HEADER */
  .header {
    background: var(--green);
    padding: 20px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.12);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    color: #fff;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header h1 span { font-size: 1.5rem; }
  .header-stats {
    display: flex;
    gap: 8px;
  }
  .stat-pill {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.8rem;
    font-weight: 500;
  }
  .stat-pill.done { background: var(--green-light); color: var(--green); }

  /* FILTER TABS */
  .filter-tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    padding-bottom: 0;
    scrollbar-width: none;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 10px 10px 0 0;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.75);
    transition: all 0.18s;
  }
  .tab.active {
    background: var(--bg);
    color: var(--green);
    font-weight: 600;
  }
  .tab:hover:not(.active) { background: rgba(255,255,255,0.2); color: #fff; }

  /* MAIN */
  .main { padding: 16px; max-width: 640px; margin: 0 auto; }

  /* ADD FORM */
  .add-card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .add-card h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    color: var(--green);
    margin-bottom: 14px;
    font-weight: 600;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .form-grid .full { grid-column: 1 / -1; }

  label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--gray);
    margin-bottom: 4px;
  }
  input, select, textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: #fff;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
  }
  textarea { resize: none; height: 60px; line-height: 1.4; }

  .added-by-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .added-by-row label { margin-bottom: 0; white-space: nowrap; }
  .family-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .family-btn {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: #fff;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--gray);
  }
  .family-btn.active { border-color: var(--green); background: var(--green-pale); color: var(--green); font-weight: 600; }

  .add-btn {
    width: 100%;
    padding: 11px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 4px;
  }
  .add-btn:hover { background: #235e44; }
  .add-btn:active { transform: scale(0.98); }

  /* SORT / ACTIONS BAR */
  .list-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .list-bar h3 {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
  }
  .clear-done-btn {
    background: none;
    border: none;
    color: var(--orange);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .clear-done-btn:hover { background: var(--orange-pale); }

  /* SHOPPING ITEMS */
  .items-list { display: flex; flex-direction: column; gap: 10px; }

  .store-group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 16px 0 6px;
  }
  .store-group-header:first-child { margin-top: 0; }
  .store-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .store-badge.kosher { background: var(--blue-pale); color: var(--blue); }
  .store-badge.super { background: var(--green-pale); color: var(--green); }
  .store-badge.other { background: var(--purple-pale); color: var(--purple); }
  .store-divider { flex: 1; height: 1px; background: var(--border); }

  .item-card {
    background: var(--card);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    box-shadow: var(--shadow);
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
  }
  .item-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
  .item-card.done {
    opacity: 0.55;
    background: #f7f7f5;
    transform: none !important;
    box-shadow: none !important;
  }
  .item-card.done .item-name { text-decoration: line-through; color: var(--gray); }

  /* Checkbox */
  .check-wrap {
    flex-shrink: 0;
    margin-top: 2px;
  }
  .check-circle {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
    background: #fff;
  }
  .item-card.done .check-circle {
    background: var(--green);
    border-color: var(--green);
  }
  .check-icon { display: none; color: #fff; font-size: 0.85rem; font-weight: 700; }
  .item-card.done .check-icon { display: block; }
  .check-circle .uncheck-icon { color: var(--gray); font-size: 0.7rem; }
  .item-card.done .uncheck-icon { display: none; }

  /* Item body */
  .item-body { flex: 1; min-width: 0; }
  .item-top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .item-name {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
  }
  .item-qty {
    font-size: 0.8rem;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 20px;
    background: var(--orange-pale);
    color: var(--orange);
    flex-shrink: 0;
  }
  .item-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
    align-items: center;
  }
  .item-store {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .item-store.kosher { background: var(--blue-pale); color: var(--blue); }
  .item-store.super { background: var(--green-pale); color: var(--green); }
  .item-store.other { background: var(--purple-pale); color: var(--purple); }

  .item-note {
    font-size: 0.78rem;
    color: var(--gray);
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .item-added-by {
    font-size: 0.72rem;
    color: #aaa;
    margin-top: 4px;
  }

  /* Delete btn */
  .delete-btn {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: none;
    color: #ccc;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin-top: 1px;
  }
  .delete-btn:hover { background: var(--orange-pale); color: var(--orange); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--gray);
  }
  .empty .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty p { font-size: 0.95rem; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #fff;
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 0.88rem;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    z-index: 999;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 420px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    .header h1 { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1><span>🛒</span> Family Shop</h1>
    <div class="header-stats">
      <span class="stat-pill" id="totalPill">0 items</span>
      <span class="stat-pill done" id="donePill">0 done</span>
    </div>
  </div>
  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('all',this)">All</button>
    <button class="tab" onclick="setFilter('todo',this)">Still to buy</button>
    <button class="tab" onclick="setFilter('kosher',this)">🔵 Kosher shop</button>
    <button class="tab" onclick="setFilter('supermarket',this)">🟢 Supermarket</button>
    <button class="tab" onclick="setFilter('other',this)">🟣 Other</button>
    <button class="tab" onclick="setFilter('done',this)">✅ Done</button>
  </div>
</div>

<div class="main">

  <!-- ADD FORM -->
  <div class="add-card">
    <h2>+ Add item</h2>
    <div class="form-grid">
      <div class="full">
        <label>Item name *</label>
        <input id="f-name" type="text" placeholder="e.g. Almond milk" />
      </div>
      <div>
        <label>Quantity</label>
        <input id="f-qty" type="text" placeholder="e.g. 2 bottles" />
      </div>
      <div>
        <label>Where to buy</label>
        <select id="f-store">
          <option value="supermarket">🟢 Supermarket</option>
          <option value="kosher">🔵 Kosher shop</option>
          <option value="other">🟣 Other / any</option>
        </select>
      </div>
      <div class="full">
        <label>Notes / comments</label>
        <textarea id="f-note" placeholder="e.g. Only organic · Check sugar-free · Brand: Alpro"></textarea>
      </div>
    </div>
    <div class="added-by-row">
      <label>Added by:</label>
      <div class="family-btns" id="familyBtns">
        <button class="family-btn active" data-name="Me" onclick="selectMember(this)">Me</button>
        <button class="family-btn" data-name="Mum" onclick="selectMember(this)">Mum</button>
        <button class="family-btn" data-name="Dad" onclick="selectMember(this)">Dad</button>
        <button class="family-btn" data-name="Yael" onclick="selectMember(this)">Yael</button>
        <button class="family-btn" data-name="Simona" onclick="selectMember(this)">Simona</button>
      </div>
    </div>
    <button class="add-btn" onclick="addItem()">Add to list</button>
  </div>

  <!-- LIST -->
  <div class="list-bar">
    <h3 id="listTitle">Shopping List</h3>
    <button class="clear-done-btn" onclick="clearDone()">Remove done ✓</button>
  </div>

  <div class="items-list" id="itemsList"></div>

  <div class="toast" id="toast"></div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────
const STORAGE_KEY = 'family_shopping_v2';
let items = [];
let filter = 'all';
let selectedMember = 'Me';

function load() {
  try { items = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { items = []; }
  if (!items.length) {
    items = [
      { id: 1, name: 'Whole milk', qty: '2 bottles', store: 'supermarket', note: 'Full fat', by: 'Mum', done: false, ts: Date.now()-5000 },
      { id: 2, name: 'Challah bread', qty: '1 loaf', store: 'kosher', note: 'For Friday', by: 'Dad', done: false, ts: Date.now()-4000 },
      { id: 3, name: 'Oat milk', qty: '3 cartons', store: 'supermarket', note: 'Sugar-free only', by: 'Me', done: false, ts: Date.now()-3000 },
      { id: 4, name: 'Organic baby spinach', qty: '1 bag', store: 'supermarket', note: 'Organic brand only', by: 'Simona', done: true, ts: Date.now()-2000 },
    ];
  }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }

// ─── FAMILY MEMBER ───────────────────────────────────────────
function selectMember(btn) {
  document.querySelectorAll('.family-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedMember = btn.dataset.name;
}

// ─── FILTER ──────────────────────────────────────────────────
function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ─── ADD ITEM ────────────────────────────────────────────────
function addItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { shake('f-name'); return; }
  const item = {
    id: Date.now(),
    name,
    qty: document.getElementById('f-qty').value.trim() || '',
    store: document.getElementById('f-store').value,
    note: document.getElementById('f-note').value.trim() || '',
    by: selectedMember,
    done: false,
    ts: Date.now()
  };
  items.unshift(item);
  save();
  render();
  // Reset
  document.getElementById('f-name').value = '';
  document.getElementById('f-qty').value = '';
  document.getElementById('f-note').value = '';
  toast('Added: ' + name);
}

function shake(id) {
  const el = document.getElementById(id);
  el.style.borderColor = 'var(--orange)';
  el.style.animation = 'none';
  el.focus();
  setTimeout(() => { el.style.borderColor = ''; }, 1200);
}

// ─── TOGGLE DONE ─────────────────────────────────────────────
function toggleDone(id) {
  const item = items.find(i => i.id === id);
  if (item) { item.done = !item.done; save(); render(); }
}

// ─── DELETE ──────────────────────────────────────────────────
function deleteItem(id, e) {
  e.stopPropagation();
  items = items.filter(i => i.id !== id);
  save();
  render();
  toast('Item removed');
}

// ─── CLEAR DONE ──────────────────────────────────────────────
function clearDone() {
  const count = items.filter(i => i.done).length;
  if (!count) return;
  items = items.filter(i => !i.done);
  save();
  render();
  toast(`Cleared ${count} done item${count > 1 ? 's' : ''}`);
}

// ─── RENDER ──────────────────────────────────────────────────
const storeLabels = { kosher: '🔵 Kosher shop', supermarket: '🟢 Supermarket', other: '🟣 Other' };
const storeClass  = { kosher: 'kosher', supermarket: 'super', other: 'other' };

function filteredItems() {
  switch(filter) {
    case 'todo': return items.filter(i => !i.done);
    case 'done': return items.filter(i => i.done);
    case 'kosher': return items.filter(i => i.store === 'kosher' && !i.done);
    case 'supermarket': return items.filter(i => i.store === 'supermarket' && !i.done);
    case 'other': return items.filter(i => i.store === 'other' && !i.done);
    default: return [...items];
  }
}

function render() {
  const list = document.getElementById('itemsList');
  const visible = filteredItems();
  const total = items.length;
  const done  = items.filter(i => i.done).length;

  document.getElementById('totalPill').textContent = total + ' item' + (total !== 1 ? 's' : '');
  document.getElementById('donePill').textContent  = done  + ' done';

  const titles = { all:'Shopping List', todo:'Still to Buy', done:'Done ✓', kosher:'Kosher Shop', supermarket:'Supermarket', other:'Other' };
  document.getElementById('listTitle').textContent = titles[filter] || 'Shopping List';

  if (!visible.length) {
    list.innerHTML = `<div class="empty"><div class="emoji">${filter === 'done' ? '✅' : '🛍️'}</div><p>${filter === 'done' ? 'Nothing done yet!' : 'No items here yet.'}</p></div>`;
    return;
  }

  // Group by store (only for 'all' and 'todo' views)
  const grouped = filter === 'all' || filter === 'todo';
  let html = '';

  if (grouped) {
    const order = ['kosher', 'supermarket', 'other'];
    const groups = {};
    order.forEach(s => { groups[s] = visible.filter(i => i.store === s && !i.done); });
    const doneItems = visible.filter(i => i.done);

    order.forEach(store => {
      if (!groups[store].length) return;
      const sc = storeClass[store];
      html += `<div class="store-group-header">
        <span class="store-badge ${sc}">${storeLabels[store]}</span>
        <span class="store-divider"></span>
      </div>`;
      groups[store].forEach(item => { html += itemHTML(item); });
    });

    if (doneItems.length && filter === 'all') {
      html += `<div class="store-group-header">
        <span class="store-badge" style="background:#f0f0ec;color:#999;">✅ Done</span>
        <span class="store-divider"></span>
      </div>`;
      doneItems.forEach(item => { html += itemHTML(item); });
    }
  } else {
    visible.forEach(item => { html += itemHTML(item); });
  }

  list.innerHTML = html;
}

function itemHTML(item) {
  const sc = storeClass[item.store];
  return `
  <div class="item-card ${item.done ? 'done' : ''}" onclick="toggleDone(${item.id})">
    <div class="check-wrap">
      <div class="check-circle">
        <span class="check-icon">✓</span>
        <span class="uncheck-icon">○</span>
      </div>
    </div>
    <div class="item-body">
      <div class="item-top">
        <span class="item-name">${escHtml(item.name)}</span>
        ${item.qty ? `<span class="item-qty">${escHtml(item.qty)}</span>` : ''}
      </div>
      <div class="item-meta">
        <span class="item-store ${sc}">${storeLabels[item.store]}</span>
        ${item.note ? `<span class="item-note">💬 ${escHtml(item.note)}</span>` : ''}
      </div>
      <div class="item-added-by">Added by ${escHtml(item.by)}</div>
    </div>
    <button class="delete-btn" onclick="deleteItem(${item.id},event)" title="Remove">✕</button>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── TOAST ───────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── ENTER KEY ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.id === 'f-name') addItem();
});

// ─── INIT ────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
